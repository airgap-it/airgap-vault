<ion-header transparent class="ion-no-border">
  <ion-toolbar transparent>
    <ion-title>{{ title }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-row class="ion-padding-horizontal" [innerHtml]="description"></ion-row>

  @if (imageUrl) {
    <ion-row class="ion-justify-content-center"><img class="warning-img" [src]="imageUrl" /></ion-row>
  }

  @if (buttonText) {
    <ion-fab vertical="bottom" horizontal="end" slot="fixed">
      <ion-button default (click)="handler()" color="primary" shape="round" item-right>{{ buttonText }}</ion-button>
    </ion-fab>
  }
</ion-content>
